name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Verify version consistency
        run: node bin/check-release-versions.mjs "${{ github.ref_name }}"

      - name: Verify npm publish access
        run: |
          set -euo pipefail
          user="$(npm whoami)"
          echo "Authenticated to npm as $user"
          for pkg in \
            "@fuentesjr/mycelium-cli-darwin-arm64" \
            "@fuentesjr/mycelium-cli-darwin-amd64" \
            "@fuentesjr/mycelium-cli-linux-arm64" \
            "@fuentesjr/mycelium-cli-linux-amd64" \
            "pi-mycelium"; do
            npm access list collaborators "$pkg" "$user" --json > /tmp/npm-access.json
            node -e 'const fs = require("fs"); const [user, pkg] = process.argv.slice(1); const data = JSON.parse(fs.readFileSync("/tmp/npm-access.json", "utf8")); const perm = data[user]; if (perm !== "read-write") { console.error(`${pkg}: expected read-write access for ${user}, got ${perm ?? "none"}`); process.exit(1); }' "$user" "$pkg"
            echo "Verified read-write npm access for $pkg"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run Go tests
        run: go test ./...

      - name: Run TypeScript tests
        # Use `npm install` rather than `npm ci`: optionalDependencies pin
        # to the just-being-cut version, which isn't on the registry until
        # the publish step runs later in this same job.
        run: cd extensions/pi-mycelium && npm install --no-audit --no-fund && npm test

      - name: Build cross-platform binaries and npm platform packages
        run: make npm-dist VERSION=${{ github.ref_name }}

      - name: Publish platform packages to npm
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          for plat in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            pkg="@fuentesjr/mycelium-cli-$plat"
            if npm view "$pkg@$ver" version >/dev/null 2>&1; then
              echo "$pkg@$ver already published, skipping"
              continue
            fi
            echo "Publishing $pkg@$ver ..."
            (cd dist/npm/cli-$plat && npm publish --access=public --provenance)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish meta package to npm
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          if npm view "pi-mycelium@$ver" version >/dev/null 2>&1; then
            echo "pi-mycelium@$ver already published, skipping"
            exit 0
          fi
          cd extensions/pi-mycelium && npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: dist/mycelium-${{ github.ref_name }}-*.tar.gz
