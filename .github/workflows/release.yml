name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version consistency
        run: |
          TAG="${{ github.ref_name }}"
          TAG_VER="${TAG#v}"

          MAKEFILE_VER=$(grep -E '^VERSION\s*\?=' Makefile | sed 's/VERSION\s*?=\s*//' | tr -d ' ' | sed 's/^v//')
          PKG_VER=$(node -p "require('./extensions/pi-mycelium/package.json').version")

          echo "Tag version:      $TAG_VER"
          echo "Makefile VERSION: $MAKEFILE_VER"
          echo "package.json:     $PKG_VER"

          FAILED=0
          if [ "$TAG_VER" != "$MAKEFILE_VER" ]; then
            echo "ERROR: Tag version ($TAG_VER) does not match Makefile VERSION ($MAKEFILE_VER)"
            FAILED=1
          fi
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "ERROR: Tag version ($TAG_VER) does not match extensions/pi-mycelium/package.json version ($PKG_VER)"
            FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Fix the version in the lagging file, recommit, delete the tag, and push a new tag."
            exit 1
          fi
          echo "Version consistency check passed: $TAG_VER"

      - name: Run Go tests
        run: cd cmd/mycelium && go test ./...

      - name: Run TypeScript tests
        run: cd extensions/pi-mycelium && npm ci && npm test

      - name: Build cross-platform binaries and npm platform packages
        run: make npm-dist VERSION=${{ github.ref_name }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: dist/mycelium-${{ github.ref_name }}-*.tar.gz

      - name: Publish platform packages to npm
        run: |
          for plat in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            echo "Publishing @fuentesjr/mycelium-cli-$plat ..."
            (cd dist/npm/cli-$plat && npm publish --access=public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish meta package to npm
        run: cd extensions/pi-mycelium && npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
